name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint + Test + Build (API 34)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore (for AAB)
        # Required only for the AAB build job. Skip if no secret present.
        if: ${{ env.POS_KEYSTORE_BASE64 != '' }}
        env:
          POS_KEYSTORE_BASE64: ${{ secrets.POS_KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$POS_KEYSTORE_BASE64" | base64 -d > keystore/release.keystore

      - name: Write keystore.properties
        if: ${{ env.POS_KEYSTORE_BASE64 != '' }}
        env:
          POS_KEYSTORE_PATH: keystore/release.keystore
          POS_KEYSTORE_PASSWORD: ${{ secrets.POS_KEYSTORE_PASSWORD }}
          POS_KEY_ALIAS: ${{ secrets.POS_KEY_ALIAS }}
          POS_KEY_PASSWORD: ${{ secrets.POS_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          POS_KEYSTORE_PATH=$POS_KEYSTORE_PATH
          POS_KEYSTORE_PASSWORD=$POS_KEYSTORE_PASSWORD
          POS_KEY_ALIAS=$POS_KEY_ALIAS
          POS_KEY_PASSWORD=$POS_KEY_PASSWORD
          EOF

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Assemble release AAB
        if: ${{ env.POS_KEYSTORE_BASE64 != '' }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload AAB
        if: ${{ env.POS_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
